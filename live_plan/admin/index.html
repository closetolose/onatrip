<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Trip Admin</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/cropperjs@1.6.2/dist/cropper.min.css">
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-head">
        <h1>Trip Admin</h1>
        <p>Фото, текст, порядок</p>
      </div>
      <div id="days-list" class="days-list"></div>
    </aside>

    <main class="editor">
      <div id="empty-state" class="empty-state">Выбери день слева</div>

      <div id="editor-panel" class="hidden">
        <header class="editor-head">
          <div>
            <div class="eyebrow" id="editor-day-label">День 1</div>
            <h2 id="editor-title"></h2>
          </div>
          <div class="head-actions">
            <button type="button" id="btn-preview" class="btn secondary">Предпросмотр</button>
            <button type="button" id="btn-save" class="btn">Сохранить</button>
            <button type="button" id="btn-build" class="btn accent">Собрать сайт</button>
          </div>
        </header>

        <section class="panel">
          <label for="intro">Текст о дне</label>
          <textarea id="intro" rows="3" placeholder="Короткое описание для родных"></textarea>
        </section>

        <section class="panel">
          <div class="panel-head">
            <h3>Фото</h3>
            <label class="btn secondary upload-btn">
              + Загрузить
              <input type="file" id="file-input" accept="image/*" multiple hidden>
            </label>
          </div>
          <p class="hint">Перетаскивай карточки для смены порядка. Клик — обрезка и подпись.</p>
          <div id="photo-grid" class="photo-grid"></div>
        </section>

        <div id="status" class="status"></div>
      </div>
    </main>
  </div>

  <div id="modal" class="modal hidden">
    <div class="modal-box">
      <div class="modal-head">
        <h3>Редактор фото</h3>
        <button type="button" id="modal-close" class="icon-btn">✕</button>
      </div>
      <div class="crop-wrap">
        <img id="crop-image" alt="">
      </div>
      <label>Подпись</label>
      <input type="text" id="crop-caption" placeholder="Подпись под фото">
      <div class="modal-actions">
        <button type="button" id="btn-delete-photo" class="btn danger">Удалить</button>
        <button type="button" id="btn-apply-crop" class="btn accent">Применить обрезку</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/cropperjs@1.6.2/dist/cropper.min.js"></script>
  <script src="admin.js"></script>
</body>
</html>
