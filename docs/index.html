<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b1220">
  <title>Никита · поездка 28.07 — 25.08.2026</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <div id="gate" class="gate hidden">
    <div class="gate-box">
      <div class="eyebrow">Live plan</div>
      <h1>Доступ по ссылке</h1>
      <p>Введите ключ из ссылки, которую вам отправили</p>
      <input id="gate-input" type="text" placeholder="Ключ доступа" autocomplete="off">
      <button id="gate-submit" type="button">Открыть</button>
    </div>
  </div>

  <div id="app" class="wrap hidden">
    <header class="hero">
      <div class="eyebrow">Live plan</div>
      <h1>Никита</h1>
      <p class="subtitle">Красноярск → Таиланд → Вьетнам → Китай → домой · 28.07 — 25.08.2026</p>
      <div id="route-strip" class="route-strip"></div>
    </header>

    <div id="note-banner" class="note-banner hidden">
      <div class="label">Сообщение от путешественника</div>
      <div id="note-text" class="note-text"></div>
      <div id="note-time" class="note-time"></div>
    </div>

    <section class="card now-card">
      <div class="card-label">Сейчас</div>
      <div id="now-title" class="now-title">Загрузка…</div>
      <div id="now-night" class="night"></div>
      <div id="now-highlights"></div>
    </section>

    <section id="tomorrow-block" class="card tomorrow-card hidden">
      <div class="card-label">Завтра</div>
      <div id="tomorrow-title" class="tomorrow-title"></div>
      <div id="tomorrow-event" class="tomorrow-event"></div>
    </section>

    <section class="days-section">
      <h2>Весь маршрут</h2>
      <div id="days-list"></div>
    </section>

    <footer>
      Обновлено: 2026-07-02 17:37
    </footer>
  </div>

  <script src="assets/app.js"></script>
</body>
</html>
