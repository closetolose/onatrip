name: Build live plan

on:
  push:
    branches: [main, master]
    paths:
      - "пошаговый_гид_2026.md"
      - "live_plan/**"
      - "build_live_plan.py"
      - "trip_parser.py"
  pull_request:
    paths:
      - "пошаговый_гид_2026.md"
      - "live_plan/**"
      - "build_live_plan.py"
      - "trip_parser.py"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install jinja2

      - name: Build docs
        run: python build_live_plan.py

      - name: Verify output
        run: test -f docs/index.html && test -f docs/trip.json

      - name: Commit and push docs
        if: github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --staged --quiet; then
            echo "docs/ unchanged, skip commit"
          else
            git commit -m "chore: rebuild live plan"
            git push
          fi
