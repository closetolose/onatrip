name: Build live plan

on:
  push:
    branches: [main, master]
    paths:
      - "пошаговый_гид_2026.md"
      - "live_plan/**"
      - "build_live_plan.py"
      - "trip_parser.py"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-live-plan
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install jinja2

      - name: Build site
        run: python build_live_plan.py

      - name: Verify output
        run: test -f docs/index.html && test -f docs/assets/style.css && test -f docs/trip.json && test -f docs/assets/app.js

      - name: Commit and push docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --staged --quiet; then
            echo "docs/ unchanged"
          else
            git commit -m "chore: rebuild live plan [skip ci]"
            git push
          fi
