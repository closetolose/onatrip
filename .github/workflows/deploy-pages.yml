name: Deploy site

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install jinja2

      - name: Build site
        run: python build_live_plan.py

      - name: Verify output
        run: |
          test -f docs/index.html
          test -f docs/chapters/thailand.html
          test -d docs/days

      - name: Publish to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: docs
          branch: gh-pages
          clean: true
          commit-message: "Deploy site from ${{ github.sha }}"
